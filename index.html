<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Dr. Hygiene Profile</title> 
    
    <!-- SEO Meta Tags -->
    <meta property="og:type" content="website">
    <meta id="og-title" property="og:title" content="Dr. Hygiene Profile">
    <meta id="og-image" property="og:image" content="">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(180deg, #E0F7FA 0%, #FFFFFF 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; 
        }
        
        .btn-hover { transition: transform 0.2s; }
        .btn-hover:active { transform: scale(0.95); }
        
        /* ป้องกันอาการหน้าเว็บกระพริบตอนโหลด */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #app { visibility: hidden; }
        #app.ready { visibility: visible; }
    </style>
</head>
<body class="py-8 px-4 w-full"> 

    <div id="app" class="w-full max-w-md p-6 relative mx-auto min-h-[600px] flex flex-col fade-in">
        
        <!-- Header / Logo Area -->
        <div class="flex justify-end items-center mb-6">
            <img src="https://github.com/wrp-01/drhygieneadmin/blob/47cd08681ac43289ff1a3aab8de33c3044d3b991/1x/LG.png?raw=true" 
                 alt="Dr. Hygiene Logo" 
                 class="h-16 object-contain drop-shadow-sm">
        </div>

        <!-- PROFILE VIEW -->
        <div>
            <!-- Intro Text -->
            <div class="mb-4">
                <div class="flex items-center gap-2 mb-1">
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                    <p class="text-gray-500 text-lg font-light">Hello! My name is</p>
                </div>
                <h2 id="user-name" class="text-2xl font-bold text-gray-900 leading-tight"></h2>
                <p id="user-role" class="text-sm text-blue-600 font-medium mt-1"></p>
            </div>

            <!-- Profile & Contact Grid -->
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="flex items-center justify-center relative">
                    <div class="w-full relative">
                        <img id="user-img" src="" alt="Profile" class="w-full h-auto object-contain drop-shadow-lg">
                    </div>
                </div>

                <!-- Contact Box -->
                <div class="bg-[#3B82F6] rounded-2xl p-3 flex flex-col justify-between shadow-lg text-white relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-16 h-16 bg-white/10 rounded-full -mr-8 -mt-8"></div>
                    <div class="text-center mb-2 relative z-10">
                        <h3 class="font-semibold text-lg">Contact</h3>
                    </div>
                    <div class="space-y-2 relative z-10">
                        <a id="link-phone" href="#" class="bg-white text-blue-600 rounded-full py-2 px-3 flex items-center gap-2 shadow-sm btn-hover no-underline">
                            <i class="fas fa-phone-alt text-lg scale-x-[-1]"></i>
                            <span class="font-bold text-sm flex-1 text-center">Call Me</span>
                        </a>
                        <a id="link-line" href="#" target="_blank" class="bg-white text-green-500 rounded-full py-2 px-3 flex items-center gap-2 shadow-sm btn-hover no-underline">
                            <i class="fab fa-line text-xl"></i>
                            <span class="font-bold text-sm flex-1 text-center text-blue-500">Line</span>
                        </a>
                        <a href="https://www.drhygiene.co.th/" target="_blank" class="bg-white text-blue-600 rounded-full py-2 px-3 flex items-center gap-2 shadow-sm btn-hover no-underline">
                            <i class="fas fa-globe text-xl"></i>
                            <span class="font-bold text-sm flex-1 text-center">Website</span>
                        </a>
                    </div>
                    <div class="mt-3 text-center relative z-10">
                        <p class="text-[10px] text-blue-100 font-medium">Mon. - Fri. 08.30 - 17.30</p>
                    </div>
                </div>
            </div>

            <!-- Social Media Section -->
            <div class="mb-6">
                <h3 class="font-bold text-xl mb-3">Dr.Hygiene Social Media</h3>
                <div class="flex gap-3">
                    <a href="https://www.facebook.com/Drhygieneofficial" class="w-12 h-12 bg-[#3b5998] rounded-xl flex items-center justify-center text-white text-2xl shadow-md btn-hover"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://www.instagram.com/dr_hygienemedical" class="w-12 h-12 bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-500 rounded-xl flex items-center justify-center text-white text-2xl shadow-md btn-hover"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.tiktok.com/@drhygienemedical" class="w-12 h-12 bg-black rounded-xl flex items-center justify-center text-white text-2xl shadow-md btn-hover"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
            
            <!-- Map Links -->
            <div class="mb-6 space-y-4">
                <h3 class="font-bold text-xl mb-1">Dr.Hygiene Map</h3>
                <a href="https://share.google/h2NqxImq8oBafilI5" class="block bg-gray-50 rounded-2xl overflow-hidden shadow-sm group">
                    <div class="flex">
                        <div class="w-1/3 relative"><img src="https://github.com/wrp-01/drhygieneadmin/blob/47cd08681ac43289ff1a3aab8de33c3044d3b991/1x/ho.png?raw=true" class="w-full h-24 object-cover"></div>
                        <div class="w-2/3 p-3 flex flex-col justify-center">
                            <span class="text-[10px] bg-[#D4E8D4] text-[#385936] px-2 py-0.5 rounded-full w-fit mb-1 font-semibold">Head Office</span>
                            <h4 class="font-bold text-gray-800 text-sm">Head office map location</h4>
                        </div>
                    </div>
                </a>
            </div>

            <!-- Shop Section -->
            <div class="mb-4">
                <h3 class="font-bold text-xl mb-3">Dr.Hygiene Shop</h3>
                <div class="flex gap-4">
                    <a href="https://shorturl.at/FZGjw" class="flex flex-col items-center gap-1 btn-hover"><div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-md p-2"><img src="https://github.com/wrp-01/drhygieneadmin/blob/47cd08681ac43289ff1a3aab8de33c3044d3b991/1x/shp.png?raw=true" class="w-full h-full object-contain"></div><span class="text-xs font-semibold">Shopee</span></a>
                    <a href="https://shorturl.at/KVMVr" class="flex flex-col items-center gap-1 btn-hover"><div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-md p-2"><img src="https://github.com/wrp-01/drhygieneadmin/blob/47cd08681ac43289ff1a3aab8de33c3044d3b991/1x/laz.png?raw=true" class="w-full h-full object-contain"></div><span class="text-xs font-semibold">Lazada</span></a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Database - ข้อมูลพนักงาน
        const users = {
            "fuse": {
                name: "Fuse Weerapong Hamathulin",
                role: "Sales Manager",
                phone: "0661241409",
                line: "https://line.me/ti/p/ACtAwxfd8n",
                img: "https://github.com/wrp-01/drhygieneadmin/blob/47cd08681ac43289ff1a3aab8de33c3044d3b991/1x/Fuse.png?raw=true"
            },
            "nan": {
                name: "Nan Sunanta Leelapattana",
                role: "Deputy Chief Executive Officer • Management",
                phone: "088-010-3260",
                line: "https://line.me/ti/p/example",
                img: "https://github.com/wrp-01/drhygieneadmin/blob/126e9128879fbcbe37fc3d577db1f2deaf5208c6/1x/K.nan.png"
            }
        };

        // 2. Logic การโหลดข้อมูล (ปรับปรุงให้ทำงานได้เสถียรขึ้นบน GitHub)
        function initApp() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const username = urlParams.get('user') || 'fuse'; 
                const userData = users[username.toLowerCase()];

                if (userData) {
                    document.getElementById('user-name').textContent = userData.name;
                    document.getElementById('user-role').textContent = userData.role;
                    document.getElementById('user-img').src = userData.img;
                    document.getElementById('link-phone').href = 'tel:' + userData.phone;
                    document.getElementById('link-line').href = userData.line;
                    
                    document.title = userData.name + " - Dr. Hygiene";
                } else {
                    document.getElementById('user-name').textContent = "ไม่พบข้อมูลผู้ใช้งาน";
                }

                // แสดงผลหลังจากโหลดข้อมูลเสร็จ
                document.getElementById('app').classList.add('ready');
            } catch (error) {
                console.error("Error loading profile:", error);
            }
        }

        // ตรวจสอบความพร้อมของ DOM ก่อนรัน JS
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>

</body>
</html>

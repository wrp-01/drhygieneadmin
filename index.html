            }
        };

        let currentLang = localStorage.getItem('dr_lang') || 'th';

        function updateUI() {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('user') || 'fuse'; 
            const userData = users[username.toLowerCase()];
            const t = translations[currentLang];

            // อัปเดตข้อความทั่วไป
            document.getElementById('txt-hello').textContent = t.hello;
            document.getElementById('txt-contact').textContent = t.contact;
            document.getElementById('txt-call').textContent = t.call;
            document.getElementById('txt-line').textContent = t.line;
            document.getElementById('txt-web').textContent = t.web;
            document.getElementById('txt-hours').textContent = t.hours;
            document.getElementById('txt-social').textContent = t.social;
            document.getElementById('txt-map').textContent = t.map;
            document.getElementById('txt-ho-badge').textContent = t.ho_badge;
            document.getElementById('txt-ho-title').textContent = t.ho_title;
            document.getElementById('txt-fc-badge').textContent = t.fc_badge;
            document.getElementById('txt-fc-title').textContent = t.fc_title;
            document.getElementById('txt-shop').textContent = t.shop;

            // อัปเดตข้อมูลพนักงาน
            const nameEl = document.getElementById('user-name');
            const roleEl = document.getElementById('user-role');
            const imgEl = document.getElementById('user-img');
            const phoneLink = document.getElementById('link-phone');
            const lineLink = document.getElementById('link-line');

            if (userData) {
                nameEl.textContent = userData.name[currentLang];
                roleEl.textContent = userData.role[currentLang];
                imgEl.src = userData.img;
                phoneLink.href = 'tel:' + userData.phone;
                lineLink.href = userData.line;
                document.title = userData.name[currentLang] + " - Dr. Hygiene";
            } else {
                nameEl.textContent = t.notfound;
                roleEl.textContent = "";
            }

            // สลับสถานะปุ่ม
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + currentLang).classList.add('active');
        }

        function changeLang(lang) {
            currentLang = lang;
            localStorage.setItem('dr_lang', lang);
            updateUI();
        }

        function initApp() {
            updateUI();
            document.getElementById('app').classList.add('ready');
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>

</body>
